version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: apex_postgres
    restart: always
    environment:
      POSTGRES_DB: apex_trader
      POSTGRES_USER: apex_user
      POSTGRES_PASSWORD: apex_secure_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: apex_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
